<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{--bg1:#a82222;--bg2:#764ba2;--card:#fff;--text:#212529;--border:#e0e0e0;--muted:#6c757d}
[data-theme=dark]{--card:#16213e;--text:#eaeaea;--border:#2d3748;--bg1:#0f3460;--bg2:#1a1a2e}
*{transition:background-color .3s,color .3s;box-sizing:border-box}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2));font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;position:relative;margin:0}
.theme-btn{position:fixed;top:1.5rem;right:1.5rem;background:rgba(255,255,255,.2);border:none;color:#fff;width:46px;height:46px;border-radius:50%;font-size:1.1rem;cursor:pointer;backdrop-filter:blur(10px);z-index:1000}
.theme-btn:hover{background:rgba(255,255,255,.35);transform:rotate(180deg)}
.card{background:var(--card);border-radius:24px;padding:2.5rem 2.2rem;box-shadow:0 20px 60px rgba(0,0,0,.18);position:relative;overflow:hidden;width:100%;max-width:440px;border:none}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--bg1),var(--bg2))}
.logo{text-align:center;margin-bottom:1.8rem}
.logo-icon{font-size:3.2rem;background:linear-gradient(135deg,var(--bg1),var(--bg2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo h1{font-size:1.7rem;font-weight:700;color:var(--text);margin:.4rem 0 .2rem}
.logo p{color:var(--muted);font-size:.85rem;margin:0}
.tabs{display:flex;gap:.75rem;margin-bottom:1.8rem}
.tab-btn{flex:1;padding:.75rem .5rem;border:none;background:transparent;color:var(--text);font-weight:600;font-size:.95rem;border-radius:10px;cursor:pointer;transition:all .25s}
.tab-btn.active{background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#fff;box-shadow:0 4px 14px rgba(102,126,234,.3)}
.tab-btn .tab-icon{display:block;font-size:1.2rem;margin-bottom:.3rem}
.form-wrap{display:none;animation:fadeIn .3s ease}
.form-wrap.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.field{margin-bottom:1.3rem}
.field label{display:block;margin-bottom:.4rem;color:var(--text);font-weight:600;font-size:.88rem}
.field-inner{position:relative}
.field-inner i.lead{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}
.field input{width:100%;padding:.85rem 1rem .85rem 2.7rem;border:2px solid var(--border);border-radius:11px;font-size:.97rem;background:var(--card);color:var(--text);outline:none;transition:border .25s}
.field input:focus{border-color:var(--bg1);box-shadow:0 0 0 3px rgba(168,34,34,.1)}
.eye-btn{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:.3rem}
.badge-role{display:inline-block;font-size:.72rem;font-weight:600;padding:.2rem .55rem;border-radius:6px;margin-left:.5rem;vertical-align:middle}
.badge-user{background:#e6f1fb;color:#185fa5}
.badge-ngo{background:#eaf3de;color:#3b6d11}
[data-theme=dark] .badge-user{background:#0c447c;color:#b5d4f4}
[data-theme=dark] .badge-ngo{background:#27500a;color:#c0dd97}
.submit-btn{width:100%;padding:.9rem;border:none;border-radius:11px;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#fff;font-weight:600;font-size:1rem;cursor:pointer;margin-top:.5rem;transition:all .25s}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 22px rgba(102,126,234,.3)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.alert{padding:.7rem 1rem;border-radius:9px;margin-bottom:1rem;font-size:.88rem}
.alert-error{background:#fee;color:#c33;border:1px solid #fcc}
.alert-success{background:#efe;color:#3c3;border:1px solid #cfc}
.forgot{text-align:right;margin-top:-.4rem;margin-bottom:1rem}
.forgot a{color:var(--bg1);text-decoration:none;font-size:.85rem}
.divider{text-align:center;margin:1.2rem 0;position:relative}
.divider::before{content:'';position:absolute;left:0;top:50%;width:100%;height:1px;background:var(--border)}
.divider span{background:var(--card);padding:0 .8rem;position:relative;color:var(--muted);font-size:.85rem}
.socials{display:flex;gap:.75rem}
.social-btn{flex:1;padding:.7rem;border:2px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-size:1.1rem;transition:all .25s;color:var(--text)}
.social-btn:hover{border-color:var(--bg1);transform:translateY(-2px)}
@media(max-width:500px){.card{padding:2rem 1.3rem}.logo h1{font-size:1.4rem}}
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn"><i class="fas fa-moon" id="themeIcon"></i></button>

<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
    <h1>NexusKind</h1>
    <p>Leading the front lines of community relief</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="userTab">
      <span class="tab-icon"><i class="fas fa-user"></i></span>
      User Login
    </button>
    <button class="tab-btn" id="ngoTab">
      <span class="tab-icon"><i class="fas fa-building"></i></span>
      NGO Login
    </button>
  </div>

  <div id="alertBox"></div>

  <div class="form-wrap active" id="userForm">
    <form onsubmit="handleLogin(event,'user')">
      <div class="field">
        <label>Username <span class="badge-role badge-user">User</span></label>
        <div class="field-inner">
          <i class="fas fa-user lead"></i>
          <input type="text" id="userUsername" placeholder="Enter your username" required>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-inner">
          <i class="fas fa-lock lead"></i>
          <input type="password" id="userPassword" placeholder="Enter your password" required>
          <button type="button" class="eye-btn" onclick="togglePwd('userPassword',this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button type="submit" class="submit-btn" id="userBtn">
        <i class="fas fa-sign-in-alt" style="margin-right:.4rem"></i>Login as User
      </button>
    </form>
    <div class="divider"><span>or continue with</span></div>
    <div class="socials">
      <button class="social-btn" title="Google"><i class="fab fa-google"></i></button>
      <button class="social-btn" title="Facebook"><i class="fab fa-facebook-f"></i></button>
      <button class="social-btn" title="Apple"><i class="fab fa-apple"></i></button>
    </div>
  </div>

  <div class="form-wrap" id="ngoForm">
    <form onsubmit="handleLogin(event,'ngo')">
      <div class="field">
        <label>Username <span class="badge-role badge-ngo">NGO</span></label>
        <div class="field-inner">
          <i class="fas fa-building lead"></i>
          <input type="text" id="ngoUsername" placeholder="Enter NGO username" required>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-inner">
          <i class="fas fa-lock lead"></i>
          <input type="password" id="ngoPassword" placeholder="Enter NGO password" required>
          <button type="button" class="eye-btn" onclick="togglePwd('ngoPassword',this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button type="submit" class="submit-btn" id="ngoBtn">
        <i class="fas fa-sign-in-alt" style="margin-right:.4rem"></i>Login as NGO
      </button>
    </form>
    <div class="divider"><span>or continue with</span></div>
    <div class="socials">
      <button class="social-btn" title="Google"><i class="fab fa-google"></i></button>
      <button class="social-btn" title="Facebook"><i class="fab fa-facebook-f"></i></button>
      <button class="social-btn" title="Apple"><i class="fab fa-apple"></i></button>
    </div>
  </div>
</div>

<script>
const themeBtn=document.getElementById('themeBtn');
const themeIcon=document.getElementById('themeIcon');
if(sessionStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');themeIcon.className='fas fa-sun';}
themeBtn.addEventListener('click',()=>{
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  sessionStorage.setItem('theme',dark?'light':'dark');
  themeIcon.className=dark?'fas fa-moon':'fas fa-sun';
});

document.getElementById('userTab').addEventListener('click',()=>switchTab('user'));
document.getElementById('ngoTab').addEventListener('click',()=>switchTab('ngo'));

function switchTab(role){
  document.getElementById('userTab').classList.toggle('active',role==='user');
  document.getElementById('ngoTab').classList.toggle('active',role==='ngo');
  document.getElementById('userForm').classList.toggle('active',role==='user');
  document.getElementById('ngoForm').classList.toggle('active',role==='ngo');
  document.getElementById('alertBox').innerHTML='';
}

function togglePwd(id,btn){
  const inp=document.getElementById(id);
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.querySelector('i').className=show?'fas fa-eye-slash':'fas fa-eye';
}

function showAlert(msg,type){document.getElementById('alertBox').innerHTML=`<div class="alert alert-${type}">${msg}</div>`;}

const API_URL='https://nexus-kind-auth-3vdl.onrender.com/api';

async function handleLogin(e,role){
  e.preventDefault();
  document.getElementById('alertBox').innerHTML='';
  const prefix=role==='user'?'user':'ngo';
  const username=document.getElementById(prefix+'Username').value.trim();
  const password=document.getElementById(prefix+'Password').value;
  const btn=document.getElementById(prefix+'Btn');
  btn.disabled=true;
  btn.innerHTML='<i class="fas fa-spinner fa-spin" style="margin-right:.4rem"></i>Logging in...';
  try{
    const res=await fetch(`${API_URL}/auth/${role}/login`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data=await res.json();
    if(res.ok){
      sessionStorage.setItem('token', data.token);
      sessionStorage.setItem('user', JSON.stringify(data.user));
      sessionStorage.setItem('role', role);
      showAlert('Login successful! Redirecting...', 'success');
      setTimeout(() => {
        if (role === 'ngo') {
          window.location.href = 'ngo_dashboard_2.html';
        } else {
          window.location.href = 'user_dashboard_3.html'; // swap to your user page filename
        }
      }, 1000);
    }else{
      showAlert(data.message||'Login failed. Please try again.','error');
    }
  }catch(err){
    showAlert('Cannot reach server. Is the backend running on port 5001?','error');
  }finally{
    btn.disabled=false;
    btn.innerHTML=`<i class="fas fa-sign-in-alt" style="margin-right:.4rem"></i>Login as ${role==='user'?'User':'NGO'}`;
  }
}
</script>
</body>
</html>
